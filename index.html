<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp kỉ yếu 💌</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

canvas{
  position:fixed;
  top:0;left:0;
}

/* mở thiệp */
.overlay-open{
  position:fixed;
  width:100%;height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
  cursor:pointer;
}

.overlay-open h1{
  animation:blink 1.5s infinite;
}
@keyframes blink{
  50%{opacity:0.5}
}

/* card */
.card{
  width:260px;
  height:420px;
  perspective:1200px;
  z-index:2;
  display:none;
}

.inner{
  width:100%;
  height:100%;
  transition:transform 1.2s cubic-bezier(.4,2,.3,1);
  transform-style:preserve-3d;
}

.card.flip .inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  overflow:hidden;
  backface-visibility:hidden;
}

.front img,.back img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.back{
  transform:rotateY(180deg);
}

/* countdown */
.countdown{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#ccc;
  font-size:14px;
}
</style>
</head>

<body>

<div class="overlay-open" onclick="start()">
  <h1>💌 Nhấn để mở thiệp</h1>
  <p>Graduation Memories</p>
</div>

<canvas id="stars"></canvas>

<div class="card" id="card" onclick="this.classList.toggle('flip')">
  <div class="inner">
    <div class="front">
      <img src="anh1.jpg">
    </div>

    <div class="back">
      <img src="anh2.jpg">
      <div class="countdown" id="countdown"></div>
    </div>
  </div>
</div>

<!-- nhạc -->
<audio id="music" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b9c2d60c.mp3">
</audio>

<script>
// mở thiệp
function start(){
  document.querySelector(".overlay-open").style.display="none";
  document.getElementById("card").style.display="block";
  document.getElementById("music").play();
}

// nền sao
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=0.4;
    if(s.y>canvas.height)s.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

// countdown
const targetDate = new Date("2026-04-12");

function updateCountdown(){
  const now = new Date();
  const diff = targetDate - now;

  if(diff <= 0){
document.getElementById("countdown").innerText = "🎓 Đã đến ngày kỉ yếu!";
    return;
  }

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const minutes = Math.floor((diff/(1000*60))%60);

  document.getElementById("countdown").innerText =
    `Còn ${days} ngày ${hours} giờ ${minutes} phút`;
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
